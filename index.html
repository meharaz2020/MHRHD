<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MHR Pro Precision Hybrid</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
         :root {
            --mhr-glass: rgba(255, 255, 255, 0.08);
        }
        
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        .tv-frame {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }
        /* Players */
        
        video,
        #ytPlayer {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
            display: none;
            opacity: 0;
            transition: opacity 0.5s;
            border: none;
        }
        
        .active-view {
            display: block !important;
            opacity: 1 !important;
        }
        /* UI Elements */
        
        #blackout {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 5;
            pointer-events: none;
            opacity: 1;
            transition: 0.4s;
        }
        
        #mhrBoot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        
        .mhr-logo {
            font-size: 60px;
            font-weight: 100;
            letter-spacing: 15px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.2;
            }
            50% {
                opacity: 1;
            }
        }
        /* Volume OSD */
        
        .mhr-volume-container {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 200;
            opacity: 0;
            transition: 0.3s;
        }
        
        .mhr-volume-container.active {
            opacity: 1;
            right: 50px;
        }
        
        .vol-label {
            color: white;
            font-size: 18px;
        }
        
        .glass-track {
            width: 3px;
            height: 200px;
            background: var(--mhr-glass);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .vol-level {
            width: 100%;
            position: absolute;
            bottom: 0;
            background: #fff;
            box-shadow: 0 0 10px #fff;
            transition: height 0.05s linear;
        }
    </style>
</head>

<body oncontextmenu="return false;">

    <div id="mhrBoot" onclick="launchMHR()">
        <div class="mhr-logo">MHR</div>
        <div style="font-size: 8px; letter-spacing: 5px; color: #444; margin-top: 10px;">SYSTEM START</div>
    </div>

    <div class="tv-frame">
        <div id="blackout"></div>

        <div class="mhr-volume-container" id="volOSD">
            <div class="vol-label" id="volNum">50</div>
            <div class="glass-track">
                <div class="vol-level" id="volFill" style="height: 50%;"></div>
            </div>
        </div>

        <video id="mhrPlayer" playsinline crossorigin="anonymous"></video>
        <div id="ytPlayer"></div>
    </div>

    <script>
        const playlist = [{
            type: "hls",
            url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8"
        }, {
            type: "hls",
            url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1705/output/index.m3u8"
        }, {
            type: "hls",
            url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1716/output/index.m3u8"
        }, {
            type: "hls",
            url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1715/output/index.m3u8"
        }, {
            type: "hls",
            url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1701/output/index.m3u8"
        }, {
            type: "hls",
            url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/index.m3u8"
        }, {
            type: "hls",
            url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/index.m3u8"
        }, {
            type: "hls",
            url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1704/output/index.m3u8"
        }, {
            type: "hls",
            url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1706/output/index.m3u8"
        }, {
            type: "hls",
            url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1722/output/index.m3u8"
        }, {
            type: "hls",
            url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1723/output/index.m3u8"
        }, {
            type: "hls",
            url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1711/output/1711-audio_113412_eng=113200-video=1692000.m3u8"
        }, {
            type: "hls",
            url: "https://tvsen4.aynaott.com/durontotv/index.m3u8"
        }, {
            type: "hls",
            url: "https://cloudfrontnet.vercel.app/tplay/playout/209622/master.m3u8"
        }, {
            type: "hls",
            url: "https://dzkyvlfyge.erbvr.com/PeaceTvBangla/tracks-v3a1/mono.m3u8?sid=s7AaNdTzDE2912wNcPLejQ"
        }, {
            type: "hls",
            url: "https://cloudfrontnet.vercel.app/tplay/playout/209622/master.m3u8"
        }, {
            type: "hls",
            url: ""
        }, {
            type: "hls",
            url: ""
        }, {
            type: "hls",
            url: ""
        }, {
            type: "hls",
            url: ""
        }];

        let currentIndex = 0,
            currentVol = 50,
            ytPlayer, hls = null,
            osdTimer;
        let isYtReady = false;

        const video = document.getElementById('mhrPlayer');
        const blackout = document.getElementById('blackout');

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('ytPlayer', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'iv_load_policy': 3,
                    'origin': window.location.origin // CRITICAL FIX
                },
                events: {
                    'onReady': () => {
                        isYtReady = true;
                    }
                }
            });
        }

        function launchMHR() {
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('mhrBoot').style.display = 'none';
            tune(0);
        }

        function tune(i) {
            blackout.style.opacity = "1";
            const ch = playlist[i];

            // Reset UI and stop current playback
            video.classList.remove('active-view');
            document.getElementById('ytPlayer').classList.remove('active-view');
            video.pause();

            if (hls) {
                hls.destroy();
                hls = null;
            }
            if (ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();

            // Handle Channel Type
            if (ch.type === "youtube") {
                document.getElementById('ytPlayer').classList.add('active-view');
                if (isYtReady) {
                    ytPlayer.loadVideoById(ch.url);
                    ytPlayer.setVolume(currentVol);
                    // Fade out blackout after YouTube begins loading
                    setTimeout(() => blackout.style.opacity = "0", 1500);
                }
            } else {
                video.classList.add('active-view');
                if (Hls.isSupported()) {
                    hls = new Hls({
                        xhrSetup: xhr => xhr.withCredentials = false
                    });
                    hls.loadSource(ch.url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(() => console.log("User interaction required"));
                        video.volume = currentVol / 100;
                    });
                    video.onplaying = () => blackout.style.opacity = "0";
                }
            }
        }

        function handleVolume(delta) {
            currentVol = Math.min(Math.max(currentVol + delta, 0), 100);
            video.volume = currentVol / 100;
            if (ytPlayer && ytPlayer.setVolume) ytPlayer.setVolume(currentVol);

            document.getElementById('volNum').innerText = currentVol;
            document.getElementById('volFill').style.height = currentVol + "%";
            document.getElementById('volOSD').classList.add('active');

            clearTimeout(osdTimer);
            osdTimer = setTimeout(() => document.getElementById('volOSD').classList.remove('active'), 1200);
        }

        // Navigation
        document.addEventListener("keydown", (e) => {
            if (e.keyCode === 37) { // Left
                currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
                tune(currentIndex);
            }
            if (e.keyCode === 39) { // Right
                currentIndex = (currentIndex + 1) % playlist.length;
                tune(currentIndex);
            }
            if (e.keyCode === 38) { // Up
                handleVolume(5);
                e.preventDefault();
            }
            if (e.keyCode === 40) { // Down
                handleVolume(-5);
                e.preventDefault();
            }
        });
    </script>
</body>

</html>
