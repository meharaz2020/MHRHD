        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            display: none;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        /* WIDE CONTROL HUB */
        
        .control-hub {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 300;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }
        
        .control-hub.visible {
            opacity: 1;
            pointer-events: auto;
        }
        /* Circular buttons for Refresh/FS */
        
        .btn-circle {
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            transition: 0.2s;
        }
        /* WIDE BUTTONS FOR NAVIGATION */
        
        .btn-wide {
            width: 100px;
            /* Extra wide for easy thumb access */
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.1);
            transition: 0.2s;
        }
        
        .btn-wide:active,
        .btn-circle:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.92);
        }
        
        .icon {
            width: 30px;
            height: 30px;
            fill: white;
        }
        /* CHANNEL INFO */
        
        #chInfo {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #fff;
            z-index: 10;
            opacity: 0;
            transition: 0.4s;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);

        #chNumber {
            font-size: 60px;
            font-weight: bold;
        }
        
        #chInfo.show {
            opacity: 1;
        }
        
        #boot {
            position: fixed;

            left: 0;

            color: white;

            display: flex;
            justify-content: center;

        let curIdx = 0,
            hls = null,
            uiTimer, chTimer;
        const video = document.getElementById('player');
        const hub = document.getElementById('hub');
        const loader = document.getElementById('loader');

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('boot').style.display = 'none';
                tune(0);
            }, 1000);
        };

        function showUI() {
            hub.classList.add('visible');
            clearTimeout(uiTimer);
            uiTimer = setTimeout(() => hub.classList.remove('visible'), 3500);
        }

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function next() {
            tune((curIdx + 1) % playlist.length);
        }

        function prev() {
            tune((curIdx - 1 + playlist.length) % playlist.length);
        }

        function tune(i) {
            curIdx = i;
            loader.style.display = "block";
            video.classList.remove('active-view');
            showUI();

            document.getElementById('chNumber').innerText = (curIdx + 1).toString().padStart(2, '0');
            document.getElementById('chInfo').classList.add('show');
            clearTimeout(chTimer);
            chTimer = setTimeout(() => document.getElementById('chInfo').classList.remove('show'), 2000);

            if (hls) hls.destroy();
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(playlist[curIdx]);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
                video.onwaiting = () => loader.style.display = "block";
                video.onplaying = () => {
                    loader.style.display = "none";
                    video.classList.add('active-view');
                };
            }
        }

        document.addEventListener('touchstart', showUI);
        document.addEventListener('mousemove', showUI);
