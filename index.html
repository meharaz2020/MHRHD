        let currentIndex = 0,
            currentVol = 50,
            hls = null,
            osdTimer, chTimer;
        let touchStartX = 0,
            touchEndX = 0;

        const video = document.getElementById('mhrPlayer');
        const blackout = document.getElementById('blackout');

        function launchMHR() {
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('mhrBoot').style.display = 'none';
            tune(0);
        }

        // Navigation Helpers
        function nextChannel() {
            tune((currentIndex + 1) % playlist.length);
        }

        function prevChannel() {
            tune((currentIndex - 1 + playlist.length) % playlist.length);
        }

        function tune(i) {
            currentIndex = i;
            blackout.style.opacity = "1";

            document.getElementById('chNumber').innerText = (currentIndex + 1).toString().padStart(2, '0');
            document.getElementById('chInfo').classList.add('show');
            clearTimeout(chTimer);
            chTimer = setTimeout(() => document.getElementById('chInfo').classList.remove('show'), 3000);

            if (hls) hls.destroy();
            video.classList.remove('active-view');

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(playlist[currentIndex]);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    video.classList.add('active-view');
                    blackout.style.opacity = "0";
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = playlist[currentIndex];
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                    video.classList.add('active-view');
                    blackout.style.opacity = "0";
                });
            }
        }

        function setVolume(delta) {
            currentVol = Math.min(Math.max(currentVol + delta, 0), 100);
            video.volume = currentVol / 100;
            document.getElementById('volLevel').style.height = currentVol + "%";
            document.getElementById('volBar').classList.add('active');
            clearTimeout(osdTimer);
            osdTimer = setTimeout(() => document.getElementById('volBar').classList.remove('active'), 1500);
        }

        // SWIPE SYSTEM
        const touchZone = document.getElementById('touchZone');
        touchZone.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {
            passive: true
        });

        touchZone.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 70) {
                if (diff > 0) nextChannel();
                else prevChannel();
            }
        }, {
            passive: true
        });

        // KEYBOARD SYSTEM
        document.addEventListener("keydown", (e) => {
            if (e.keyCode === 39) nextChannel();
            if (e.keyCode === 37) prevChannel();
            if (e.keyCode === 38) {
                setVolume(5);
                e.preventDefault();
            }
            if (e.keyCode === 40) {
                setVolume(-5);
                e.preventDefault();
            }
        });
