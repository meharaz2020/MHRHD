    <style>
         :root {
            --mhr-glow: rgba(255, 255, 255, 0.7);
            --mhr-glass: rgba(255, 255, 255, 0.08);
        }
        
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .tv-frame {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        video,
        #ytPlayer {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
            border: none;
            display: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .active-view {
            display: block !important;
            opacity: 1 !important;
        }
        
        #blackout {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 5;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.4s;
        }
        
        .mhr-volume-container {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 200;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .mhr-volume-container.active {
            opacity: 1;
            right: 50px;
        }
        
        .vol-label {
            color: white;
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        
        .glass-track {
            width: 3px;
            height: 200px;
            background: var(--mhr-glass);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .vol-level {
            width: 100%;
            position: absolute;
            bottom: 0;
            background: #fff;
            box-shadow: 0 0 10px #fff;
            transition: height 0.05s linear;
        }
        
        #mhrBoot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.5s;
        }
        
        .mhr-logo {
            font-size: 60px;
            font-weight: 100;
            letter-spacing: 15px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.2;
            }
            50% {
                opacity: 1;
            }
        }
    </style>
</head>

        let currentIndex = 0;
        let currentVol = 50;
        let ytPlayer;
        let hls = new Hls();
        let osdTimer;

        const video = document.getElementById('mhrPlayer');
        const blackout = document.getElementById('blackout');

        // YouTube API Initialization
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('ytPlayer', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'modestbranding': 1,
                    'rel': 0
                },
                events: {
                    'onReady': (e) => e.target.setVolume(currentVol)
                }
            });
        }

        function launchMHR() {
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('mhrBoot').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('mhrBoot').style.display = 'none';
                tune(0);
            }, 500);
        }

        function tune(i) {
            blackout.style.opacity = "1";
            const channel = playlist[i];
            const ytElement = document.getElementById('ytPlayer');

            // Reset UI and Players
            video.classList.remove('active-view');
            ytElement.classList.remove('active-view');
            video.pause();
            if (ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();

            if (channel.type === "youtube") {
                ytElement.classList.add('active-view');
                if (ytPlayer && ytPlayer.loadVideoById) {
                    ytPlayer.loadVideoById(channel.url);
                    ytPlayer.setVolume(currentVol);
                    ytPlayer.playVideo();
                }
                setTimeout(() => blackout.style.opacity = "0", 1500);
            } else {
                video.classList.add('active-view');
                if (Hls.isSupported()) {
                    hls.destroy();
                    hls = new Hls();
                    hls.loadSource(channel.url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play();
                        video.volume = currentVol / 100;
                    });
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            console.error("Stream failed. Likely expired token.");
                            document.getElementById('volNum').innerText = "OFF AIR";
                        }
                    });
                    video.onplaying = () => blackout.style.opacity = "0";
                }
            }
        }

        function handleVolume(delta) {
            currentVol = Math.min(Math.max(currentVol + delta, 0), 100);

            // Apply to HLS video element
            video.volume = currentVol / 100;

            // Apply to YouTube API
            if (ytPlayer && ytPlayer.setVolume) {
                ytPlayer.setVolume(currentVol);
            }

            // OSD Update
            document.getElementById('volNum').innerText = currentVol;
            document.getElementById('volFill').style.height = currentVol + "%";
            const osd = document.getElementById('volOSD');
            osd.classList.add('active');
            clearTimeout(osdTimer);
            osdTimer = setTimeout(() => osd.classList.remove('active'), 1200);
        }

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight") {
                currentIndex = (currentIndex + 1) % playlist.length;
                tune(currentIndex);
            } else if (e.key === "ArrowLeft") {
                currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
                tune(currentIndex);
            } else if (e.key === "ArrowUp") {
                handleVolume(5);
                e.preventDefault();
            } else if (e.key === "ArrowDown") {
                handleVolume(-5);
                e.preventDefault();
            }
        });
