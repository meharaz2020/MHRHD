<script>
    const playlist = [
        { type: "hls", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1705/output/index.m3u8" },
        { type: "hls", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1716/output/index.m3u8" },
        { type: "hls", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1715/output/index.m3u8" },
        { type: "youtube", name: "YouTube Live", url: "xVbGmFbKc4U" },
        { type: "youtube", name: "YouTube Live", url: "7P6pqY6bTDw" },
        { type: "youtube", name: "YouTube Live", url: "VXP-ubxhinA" },
        { type: "youtube", name: "YouTube Live", url: "RZphrATTkz8" },
        { type: "hls", url: "https://deshitv.deshitv24.net/live/myStream/playlist.m3u8" }
    ];

    let currentIndex = 0;
    let currentVol = 50;
    let ytPlayer;
    let hls = new Hls();
    let osdTimer;
    let touchStartX = 0;
    let touchStartY = 0;

    const video = document.getElementById('mhrPlayer');
    const blackout = document.getElementById('blackout');

    // YouTube API Initialization
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('ytPlayer', {
            height: '100%',
            width: '100%',
            playerVars: { 'autoplay': 1, 'controls': 0, 'modestbranding': 1, 'rel': 0 },
            events: { 'onReady': (e) => e.target.setVolume(currentVol) }
        });
    }

    function launchMHR() {
        document.documentElement.requestFullscreen().catch(() => {});
        document.getElementById('mhrBoot').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('mhrBoot').style.display = 'none';
            tune(0);
        }, 500);
    }

    function tune(i) {
        blackout.style.opacity = "1";
        const channel = playlist[i];
        const ytElement = document.getElementById('ytPlayer');

        video.classList.remove('active-view');
        ytElement.classList.remove('active-view');
        video.pause();
        if (ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();

        if (channel.type === "youtube") {
            ytElement.classList.add('active-view');
            if (ytPlayer && ytPlayer.loadVideoById) {
                ytPlayer.loadVideoById(channel.url);
                ytPlayer.setVolume(currentVol);
                ytPlayer.playVideo();
            }
            setTimeout(() => blackout.style.opacity = "0", 1500);
        } else {
            video.classList.add('active-view');
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    video.volume = currentVol / 100;
                });
                video.onplaying = () => blackout.style.opacity = "0";
            }
        }
    }

    function handleVolume(delta) {
        currentVol = Math.min(Math.max(currentVol + delta, 0), 100);
        video.volume = currentVol / 100;
        if (ytPlayer && ytPlayer.setVolume) ytPlayer.setVolume(currentVol);

        document.getElementById('volNum').innerText = currentVol;
        document.getElementById('volFill').style.height = currentVol + "%";
        const osd = document.getElementById('volOSD');
        osd.classList.add('active');
        clearTimeout(osdTimer);
        osdTimer = setTimeout(() => osd.classList.remove('active'), 1200);
    }

    // --- Unified Navigation (Remote + Keyboard) ---
    document.addEventListener("keydown", (e) => {
        switch(e.keyCode || e.which) {
            case 37: // Left Arrow / TV Left
                currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
                tune(currentIndex);
                break;
            case 39: // Right Arrow / TV Right
                currentIndex = (currentIndex + 1) % playlist.length;
                tune(currentIndex);
                break;
            case 38: // Up Arrow / TV Up
                handleVolume(5);
                e.preventDefault();
                break;
            case 40: // Down Arrow / TV Down
                handleVolume(-5);
                e.preventDefault();
                break;
            case 13: // Enter / OK
                if(document.getElementById('mhrBoot').style.display !== 'none') launchMHR();
                break;
        }
    });

    // --- Mobile Swipe Navigation ---
    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: false});

    document.addEventListener('touchend', e => {
        const touchEndX = e.changedTouches[0].screenX;
        const touchEndY = e.changedTouches[0].screenY;
        
        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;
        const threshold = 60;

        if (Math.abs(diffX) > Math.abs(diffY)) {
            if (Math.abs(diffX) > threshold) {
                // Horizontal Swipe: Channel Change
                if (diffX > 0) currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
                else currentIndex = (currentIndex + 1) % playlist.length;
                tune(currentIndex);
            }
        } else {
            if (Math.abs(diffY) > threshold) {
                // Vertical Swipe: Volume Control
                if (diffY < 0) handleVolume(10); // Swipe Up
                else handleVolume(-10); // Swipe Down
            }
        }
    }, {passive: false});

    // Prevent default touch behaviors (like refresh)
    document.addEventListener('touchmove', e => {
        if (e.touches.length > 1) e.preventDefault();
    }, {passive: false});
</script>
